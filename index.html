<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBCC | Outdoor Facilities Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header role="banner">
        <h1>Outdoor Facilities Scheduler</h1>
        <p>Palm Beach Country Club | Manager Portal</p>
    </header>

    <main id="app">
        <section id="form-container" aria-labelledby="form-title">
            <h2 id="form-title">Employee Availability Input</h2>
            
            <form id="scheduleForm">
                <div class="field-group">
                    <label for="firstName">First Name *</label>
                    <input type="text" id="firstName" required placeholder="e.g. John">
                    
                    <label for="lastInitial">Last Initial</label>
                    <input type="text" id="lastInitial" maxlength="1" placeholder="e.g. D">
                </div>

                <div class="field-group">
                    <div class="header-with-action">
                        <label>Date Requests (Optional)</label>
                        <button type="button" class="secondary-btn" onclick="addDateRow()">
                            + Add Date/Range
                        </button>
                    </div>
                    
                    <div id="dateListContainer">
                        </div>
                </div>

                <div class="field-group">
                    <label for="targetType">Target Metric</label>
                    <select id="targetType">
                        <option value="hours">Target Weekly Hours</option>
                        <option value="days">Target Days per Week</option>
                    </select>
                    <input type="number" id="targetValue" placeholder="e.g., 20 or 4">
                </div>

                <div class="field-group">
                    <label for="shiftStart">Desired Start Time</label>
                    <input type="time" id="shiftStart" value="06:00">
                    
                    <label for="shiftEnd">Desired End Time</label>
                    <input type="time" id="shiftEnd" value="16:00">
                </div>

                <button type="button" id="addEmployee" class="primary-btn">Add to Schedule</button>
            </form>
        </section>

        <hr>

        <section id="report-container">
            <h2 id="report-title">Generated Monthly Schedule</h2>
            <div class="table-responsive">
                <table id="scheduleTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Target</th>
                            <th>Mon</th>
                            <th>Tue</th>
                            <th>Wed</th>
                            <th>Thu</th>
                            <th>Fri</th>
                            <th>Sat</th>
                            <th>Sun</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
